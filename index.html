<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>

<body bgcolor="green">

    <h2>Registration Form</h2>

    <form>

        <label>Full Name:</label>
        <input type="text" placeholder="Enter Full Name">
        <br><br>

        <label>Email:</label>
        <input type="email" placeholder="Enter Email">
        <br><br>

        <label>Password:</label>
        <input type="password" placeholder="Enter Password">
        <br><br>

        <label>Confirm Password:</label>
        <input type="password" placeholder="Confirm Password">
        <br><br>

        <label>Mobile Number:</label>
        <input type="tel" placeholder="Enter Mobile Number">
        <br><br>

        <label>Date of Birth:</label>
        <input type="date">
        <br><br>

        <button type="submit">Register</button>
        <button type="reset">Cancel</button>

    </form>

    <br><br>

    <h2>YouTube Video</h2>

    
    <iframe width="560" height="315" src="https://www.youtube.com/embed/tAQx2c0PREg?si=rscqqx9oxeheMcdK" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>


</body>
</html>
